<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>In-Store AI Concierge</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; background: #111; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

      /* ── Chat screen ── */
      #chat-screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      #chat-header {
        padding: 1rem;
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
      }
      #chat-header h1 { font-size: 1.1rem; font-weight: 700; color: #2d6a4f; }
      #chat-header p { font-size: 0.78rem; color: #888; margin-top: 0.2rem; }

      #api-key-row {
        display: flex;
        gap: 0.5rem;
        padding: 0.6rem 1rem;
        background: #161616;
        border-bottom: 1px solid #2a2a2a;
        align-items: center;
      }
      #api-key-row label { font-size: 0.75rem; color: #aaa; white-space: nowrap; }
      #api-key-input {
        flex: 1;
        background: #252525;
        border: 1px solid #3a3a3a;
        border-radius: 0.4rem;
        padding: 0.35rem 0.6rem;
        color: #fff;
        font-size: 0.8rem;
        font-family: monospace;
      }
      #api-key-input::placeholder { color: #555; }

      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        min-height: 0;
      }
      .msg {
        max-width: 82%;
        padding: 0.6rem 0.85rem;
        border-radius: 1.1rem;
        font-size: 0.9rem;
        line-height: 1.45;
        word-break: break-word;
      }
      .msg.assistant {
        align-self: flex-start;
        background: #252525;
        color: #eee;
        border-bottom-left-radius: 0.25rem;
      }
      .msg.user {
        align-self: flex-end;
        background: #2d6a4f;
        color: #000;
        border-bottom-right-radius: 0.25rem;
      }
      .msg.system-info {
        align-self: center;
        background: transparent;
        color: #555;
        font-size: 0.75rem;
        text-align: center;
        padding: 0.2rem 0;
      }
      .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 0.6rem 0.85rem; }
      .typing-indicator span {
        width: 7px; height: 7px; border-radius: 50%;
        background: #555; animation: bounce 1.2s infinite;
      }
      .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

      #chat-input-row {
        display: flex;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        background: #1a1a1a;
        border-top: 1px solid #2a2a2a;
      }
      #chat-input {
        flex: 1;
        background: #252525;
        border: 1px solid #3a3a3a;
        border-radius: 1.5rem;
        padding: 0.55rem 1rem;
        color: #fff;
        font-size: 0.95rem;
        outline: none;
        resize: none;
        height: 2.5rem;
        line-height: 1.4;
      }
      #chat-input:focus { border-color: #2d6a4f; }
      #send-btn {
        width: 2.5rem; height: 2.5rem;
        border-radius: 50%;
        background: #2d6a4f; color: #000;
        border: none; font-size: 1.2rem;
        cursor: pointer; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
      }
      #send-btn:disabled { background: #444; cursor: default; }

      #scan-trigger-row {
        padding: 0.65rem 1rem;
        background: #1a1a1a;
        border-top: 1px solid #2a2a2a;
        display: none;
      }
      #scan-trigger-btn {
        width: 100%;
        padding: 0.75rem;
        background: #2d6a4f;
        color: #000;
        font-size: 1rem;
        font-weight: 700;
        border: none;
        border-radius: 2rem;
        cursor: pointer;
      }
      #intent-summary {
        font-size: 0.75rem;
        color: #888;
        text-align: center;
        margin-top: 0.4rem;
      }

      /* ── Scanner screen ── */
      #scan-screen { flex: 1; display: none; flex-direction: column; min-height: 0; }
      #scan-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.7rem 1rem;
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
      }
      #back-btn {
        background: none; border: none; color: #2d6a4f;
        font-size: 1.2rem; cursor: pointer; padding: 0;
      }
      #scan-intent-label {
        flex: 1;
        font-size: 0.85rem;
        color: #ccc;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #scanner-container { flex: 1; position: relative; min-height: 0; }
      #start-btn {
        position: absolute;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 0.6rem 1.8rem;
        background: #2d6a4f;
        color: #000;
        font-size: 1rem;
        font-weight: 700;
        border: none;
        border-radius: 2rem;
        cursor: pointer;
        z-index: 10;
      }
      #result-panel {
        max-height: 38vh;
        overflow-y: auto;
        padding: 0.5rem;
        background: #1a1a1a;
      }
      .result-hint { padding: 0.75rem; color: #888; text-align: center; font-size: 0.9rem; }
      .result-hint.error { color: #f55; }
      .result-card {
        background: #252525;
        border-radius: 12px;
        padding: 0.85rem 1rem;
        margin-bottom: 0.4rem;
      }
      .result-card.match { border-left: 3px solid #3c3; }
      .result-card.no-match { opacity: 0.55; }
      .result-card.unknown { color: #888; font-size: 0.9rem; }
      .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
      .category { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
      .badge { font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.45rem; border-radius: 1rem; }
      .badge.discount { background: #e33; color: #fff; }
      .badge.match-badge { background: #292; color: #fff; }
      .result-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
      .result-meta { font-size: 0.8rem; color: #aaa; margin-bottom: 0.4rem; }
      .result-price { font-size: 1.1rem; font-weight: 700; color: #52b788; margin-bottom: 0.4rem; }
      .original { color: #666; font-size: 0.85rem; font-weight: 400; margin-left: 0.4rem; }
      .result-footer { display: flex; gap: 1rem; font-size: 0.82rem; color: #ccc; margin-bottom: 0.4rem; }
      .result-desc { font-size: 0.8rem; color: #999; }
      .match-reasons { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.4rem; }
      .reason { font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 1rem; }
      .reason.hit { background: #1a3a1a; color: #6d6; }
      .reason.miss { background: #2a1a1a; color: #d66; }
    </style>
  </head>
  <body>
    <!-- Chat screen (shown first) -->
    <div id="chat-screen">
      <div id="chat-header">
        <h1>In-Store AI Concierge</h1>
        <p>Tell me what you're looking for and I'll help you find it</p>
      </div>
      <div id="api-key-row" style="display:none">
        <label for="api-key-input">API Key</label>
        <input id="api-key-input" type="password" placeholder="sk-ant-…" autocomplete="off" />
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <textarea id="chat-input" placeholder="Type your message…" rows="1"></textarea>
        <button id="send-btn">➤</button>
      </div>
      <div id="scan-trigger-row">
        <button id="scan-trigger-btn">Start Scanning →</button>
        <div id="intent-summary"></div>
      </div>
    </div>

    <!-- Scanner screen (shown after chat) -->
    <div id="scan-screen">
      <div id="scan-header">
        <button id="back-btn">←</button>
        <span id="scan-intent-label">Scanning…</span>
      </div>
      <div id="scanner-container">
        <button id="start-btn">Start Camera</button>
      </div>
      <div id="result-panel"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
